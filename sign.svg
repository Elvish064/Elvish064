<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="280 360 850 340"
     width="850" height="340"
     preserveAspectRatio="xMidYMid meet"
     role="img" aria-labelledby="title desc">
  <title id="title">Elvish animated signature - faster front half</title>
  <desc id="desc">Animated SVG signature using a thick handwritten trajectory mask. The front half of the main stroke plays faster for a smoother handwriting effect.</desc>

  <style>
    svg {
      color: #111111;
      background: transparent;
    }

    @media (prefers-color-scheme: dark) {
      svg { color: #e5e5e5; }
    }

    .signature-main,
    .signature-dot {
      fill: currentColor;
    }
  </style>

  <defs>
    <mask id="signature-reveal"
          maskUnits="userSpaceOnUse"
          maskContentUnits="userSpaceOnUse"
          x="280" y="360" width="850" height="340">
      <rect x="280" y="360" width="850" height="340" fill="black"/>

      <g transform="translate(300.395 409.417) scale(0.7604)">
        <path d="M10.0027 272.382C41.1694 262.882 107.303 240.682 122.503 227.882C141.503 211.882 149.003 204.382 147.503 198.382C146.003 192.382 133.003 178.382 92.0027 210.882C53.5027 250.882 66.0027 279.882 79.5027 284.382C83.6694 287.215 100.403 290.682 134.003 281.882C176.003 270.882 238.503 237.882 269.003 215.882C299.503 193.882 374.003 122.382 386.003 99.3817C399.003 78.3817 406.003 74.3817 425.503 22.3817C427.169 14.8817 427.003 2.98173 413.003 15.3817C395.503 30.8817 358.003 78.3818 331.503 133.882C305.003 189.382 289.003 204.882 279.003 267.882C269.003 330.882 353.503 269.882 357.003 267.882C360.503 265.882 438.003 208.382 440.503 205.382C443.003 202.382 409.503 286.882 417.003 288.382C424.503 289.882 433.503 284.882 505.003 215.882C540.503 174.382 487.003 205.882 517.503 224.882C523.503 230.215 543.503 238.382 575.503 228.382C615.503 215.882 622.003 183.382 592.503 226.382C563.003 269.382 578.503 285.882 589.003 284.882C599.503 283.882 637.503 278.382 686.003 239.882C734.503 201.382 772.003 181.882 735.503 186.882C699.503 198.882 722.003 231.882 731.503 242.382C741.503 252.049 753.603 275.982 722.003 294.382C684.503 312.382 668.503 292.882 701.503 276.382C722.003 267.549 766.303 248.682 779.503 243.882C819.503 223.588 906.203 168.6 919.003 123C941.803 99 964.503 55 977.003 39L809.503 291C845.503 257.833 919.803 197.6 929.003 222C900.003 258 892.003 314.5 1043 249"
              pathLength="1"
              fill="none"
              stroke="white"
              stroke-width="20"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-dasharray="1 1.08"
              stroke-dashoffset="1">
          <!--
            Faster front half:
            dashoffset 1 -> 0.45 happens early; the remaining strokes slow down slightly.
          -->
          <animate attributeName="stroke-dashoffset"
                   dur="4.9s"
                   repeatCount="indefinite"
                   values="1;1;0;0;1;1"
                   keyTimes="0;0.04;0.34;0.75;0.965;1"
                   calcMode="spline"
                   keySplines="0.18 0 0.10 1;0.18 0 0.10 1;0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"/>
        </path>
      </g>
    </mask>
  </defs>

