<svg width="286" height="101" viewBox="0 0 286 101" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* 核心绘制动画 */
    @keyframes draw {
      from { stroke-dashoffset: 1; }
      to   { stroke-dashoffset: 0; }
    }

    /* 基础画笔样式 */
    .pen-stroke {
      stroke: #e5e5e5;      /* 纯白画笔，适合 GitHub 深色模式 */
      stroke-width: 4px;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      
      /* 利用 pathLength="1" 魔法按比例缩放长度 */
      stroke-dasharray: 1 2;
      stroke-dashoffset: 1; 
    }

    /* 主体签名动画：耗时 5 秒 */
    .main-body {
      animation: draw 4.5s cubic-bezier(0.35, 0, 0.15, 1) forwards;
    }

    /* 圆圈点动画：耗时 0.5 秒，但要等待(delay) 4.5 秒后才开始！ */
    .dot-circle {
      animation: draw 0.5s ease-out 4.5s forwards;
    }
  </style>

